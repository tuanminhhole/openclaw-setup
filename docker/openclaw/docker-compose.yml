# ============================================
# OpenClaw Docker Compose (Template)
# ============================================
# File này sẽ được wizard generate lại với config đúng.
# Nếu bạn muốn setup thủ công, sửa các giá trị bên dưới.
# ============================================

services:
  ai-bot:
    build: .
    container_name: openclaw-bot
    restart: always
    env_file:
      - .env
    volumes:
      - <PROJECT_DIR>/.openclaw:/root/.openclaw
    ports:
      - "18789:18789"
